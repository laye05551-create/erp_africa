<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Africa — Ajouter Produit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .sidebar {
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            position: fixed;
            width: 220px;
        }
        .sidebar a {
            color: #adb5bd;
            text-decoration: none;
            display: block;
            padding: 10px 15px;
            border-radius: 10px;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }
        .sidebar a:hover, .sidebar a.active {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .main-content { margin-left: 220px; padding: 30px; }
        .brand { color: #fff; font-weight: bold; font-size: 1.2rem; margin-bottom: 20px; display: block; }
        .card { border-radius: 15px; border: none; box-shadow: 0 2px 15px rgba(0,0,0,0.08); }
        .btn-save { background: #1a1a2e; color: white; border: none; border-radius: 10px; padding: 12px 30px; }
        .btn-save:hover { background: #16213e; color: white; }
        .logout-btn { color: #ff6b6b !important; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container-fluid p-0">
    <div class="row g-0">
        <div class="sidebar">
            <span class="brand">🌍 ERP Africa</span>
            <a href="/dashboard/"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
            <a href="/stocks/" class="active"><i class="bi bi-box-seam me-2"></i>Stocks</a>
            <a href="/clients/"><i class="bi bi-people me-2"></i>Clients</a>
            <a href="/factures/"><i class="bi bi-receipt me-2"></i>Factures</a>
            <form method="post" action="/logout/" style="margin:0">
                {% csrf_token %}
                <button type="submit" class="logout-btn" style="background:none;border:none;padding:10px 15px;width:100%;text-align:left;border-radius:10px;font-size:0.9rem;cursor:pointer;">
                    <i class="bi bi-box-arrow-left me-2"></i>Déconnexion
                </button>
            </form>
        </div>

        <div class="main-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold mb-0"><i class="bi bi-plus-circle me-2"></i>Ajouter un Produit</h4>
                <a href="/stocks/" class="btn btn-outline-dark rounded-pill">
                    <i class="bi bi-arrow-left me-2"></i>Retour
                </a>
            </div>

            <div class="card p-4">
                <form method="post">
                    {% csrf_token %}
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-500">Code produit *</label>
                            <input type="text" name="code" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nom du produit *</label>
                            <input type="text" name="nom" class="form-control" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Catégorie *</label>
                            <select name="categorie" class="form-control" required>
                                {% for cat in categories %}
                                <option value="{{ cat.id }}">{{ cat.nom }}</option>
                                {% empty %}
                                <option disabled>Aucune catégorie — créez-en une d'abord</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Unité</label>
                            <input type="text" name="unite" class="form-control" value="unité">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Prix d'achat (FCFA) *</label>
                            <input type="number" name="prix_achat" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Prix de vente (FCFA) *</label>
                            <input type="number" name="prix_vente" class="form-control" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Stock actuel *</label>
                            <input type="number" name="stock_actuel" class="form-control" value="0" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Stock minimum *</label>
                            <input type="number" name="stock_minimum" class="form-control" value="5" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-save">
                        <i class="bi bi-check me-2"></i>Enregistrer le produit
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
