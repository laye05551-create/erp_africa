<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Africa — Connexion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 10px;
        }
        .brand {
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #1a1a2e;
            margin-bottom: 5px;
        }
        .tagline {
            text-align: center;
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }
        .btn-login {
            background: #1a1a2e;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px;
            width: 100%;
            font-size: 1rem;
            font-weight: 500;
        }
        .btn-login:hover {
            background: #16213e;
            color: white;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 1.5px solid #e0e0e0;
        }
        .form-control:focus {
            border-color: #1a1a2e;
            box-shadow: none;
        }
        .form-label {
            font-weight: 500;
            color: #333;
        }
        .footer-text {
            text-align: center;
            color: #999;
            font-size: 0.8rem;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">🌍</div>
        <div class="brand">ERP Africa</div>
        <div class="tagline">Gestion intelligente pour entreprises africaines</div>
        
        {% if form.errors %}
        <div class="alert alert-danger">
            Identifiants incorrects. Réessayez.
        </div>
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Nom d'utilisateur</label>
                <input type="text" name="username" class="form-control" 
                       placeholder="Votre identifiant" autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label">Mot de passe</label>
                <input type="password" name="password" class="form-control" 
                       placeholder="Votre mot de passe">
            </div>
            <button type="submit" class="btn btn-login">
                Se connecter →
            </button>
        </form>
        
        <div class="footer-text">
            ERP Africa — Dakar, Sénégal 🇸🇳
        </div>
    </div>
</body>
</html>
